<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SandboxCode UI Explorer</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}
body{
    background:#0d1117;
    color:white;
}
header{
    padding:20px;
    background:#161b22;
    text-align:center;
    border-bottom:1px solid #30363d;
}
.container{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(300px,1fr));
    gap:20px;
    padding:20px;
}
.card{
    background:#161b22;
    border:1px solid #30363d;
    border-radius:12px;
    overflow:hidden;
}
.card iframe{
    width:100%;
    height:220px;
    border:none;
    background:white;
}
.card h3{
    padding:10px;
}
.card a{
    display:block;
    padding:10px;
    color:#58a6ff;
    text-decoration:none;
}
.card a:hover{
    background:#21262d;
}
</style>

</head>

<body>

<header>
<h1>SandboxCode UI Explorer</h1>
<p>Tổng hợp toàn bộ giao diện</p>
</header>

<div class="container" id="apps"></div>

<script>

// Danh sách UI
const pages = [

{
name:"Home",
path:"./index.html"
},

{
name:"Dashboard",
path:"./dashboard/index.html"
},

{
name:"Chat",
path:"./chat/index.html"
},

{
name:"Editor",
path:"./editor/index.html"
},

{
name:"Settings",
path:"./settings/index.html"
},

{
name:"Preview",
path:"./preview/index.html"
},

{
name:"Projects",
path:"./projects/index.html"
},

{
name:"Terminal",
path:"./terminal/index.html"
}

];

const root=document.getElementById("apps");

pages.forEach(page=>{

const card=document.createElement("div");
card.className="card";

card.innerHTML=`
<iframe src="${page.path}"></iframe>
<h3>${page.name}</h3>
<a href="${page.path}" target="_blank">
Mở giao diện →
</a>
`;

root.appendChild(card);

});

</script>

</body>
  </html>
